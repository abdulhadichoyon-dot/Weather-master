<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherVue — Beautiful Weather</title>
    <style>
        :root {
            --bg-primary: #0a0a1a;
            --bg-card: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.12);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --text-tertiary: rgba(255, 255, 255, 0.45);
            --accent-sunny: #ffb347;
            --accent-rain: #5b9bd5;
            --accent-cloud: #b0bec5;
            --accent-snow: #e0e8f0;
            --accent-storm: #7c5cbf;
            --accent-glow: rgba(255, 179, 71, 0.4);
            --card-radius: 22px;
            --transition-smooth: 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            scroll-snap-type: y proximity;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            transition: background 1.2s ease;
            cursor: default;
        }

        /* ── Canvas Background ───────────────────── */
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.7;
        }

        /* ── Main Wrapper ───────────────────────── */
        .main-wrapper {
            position: relative;
            z-index: 1;
        }

        /* ── Navbar ─────────────────────────────── */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 16px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.4s ease;
            backdrop-filter: blur(0px);
            -webkit-backdrop-filter: blur(0px);
        }
        .navbar.scrolled {
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            background: rgba(10, 10, 26, 0.65);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
            padding: 10px 28px;
        }
        .navbar .logo {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 0%, #a0c4ff 50%, #ffb347 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            transition: all 0.4s;
        }
        .navbar .search-container {
            display: flex;
            align-items: center;
            gap: 8px;
            position: relative;
        }
        .navbar .search-input {
            background: rgba(255, 255, 255, 0.08);
            border: 1.5px solid rgba(255, 255, 255, 0.18);
            border-radius: 50px;
            padding: 10px 18px;
            color: #fff;
            font-size: 0.95rem;
            width: 220px;
            outline: none;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .navbar .search-input:focus {
            width: 280px;
            border-color: rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.14);
            box-shadow: 0 0 30px rgba(160, 196, 255, 0.25);
        }
        .navbar .search-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        .navbar .search-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            color: #fff;
            font-size: 1.1rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .navbar .search-btn:hover {
            background: rgba(255, 255, 255, 0.22);
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(255, 179, 71, 0.35);
        }
        .navbar .unit-toggle {
            background: rgba(255, 255, 255, 0.08);
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            padding: 8px 16px;
            cursor: pointer;
            color: #fff;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s;
            letter-spacing: 0.5px;
        }
        .navbar .unit-toggle:hover {
            background: rgba(255, 255, 255, 0.18);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        /* ── Sections ───────────────────────────── */
        .section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 24px 60px;
            scroll-snap-align: start;
            position: relative;
        }
        .section-hero {
            min-height: 100vh;
            flex-direction: column;
            gap: 12px;
            padding-top: 80px;
        }
        .section-hourly {
            min-height: 70vh;
            flex-direction: column;
            gap: 24px;
        }
        .section-daily {
            min-height: 80vh;
            flex-direction: column;
            gap: 24px;
        }
        .section-details {
            min-height: 70vh;
            flex-direction: column;
            gap: 24px;
        }
        .section-sun {
            min-height: 60vh;
            flex-direction: column;
            gap: 24px;
        }
        .section-air {
            min-height: 50vh;
            flex-direction: column;
            gap: 24px;
            padding-bottom: 120px;
        }

        /* ── Hero ────────────────────────────────── */
        .hero-weather-icon {
            width: 140px;
            height: 140px;
            animation: floatIcon 4s ease-in-out infinite;
            filter: drop-shadow(0 0 40px var(--accent-glow));
            transition: all 0.6s ease;
        }
        @keyframes floatIcon {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-18px);
            }
        }
        .hero-temp {
            font-size: clamp(5rem, 12vw, 9rem);
            font-weight: 200;
            letter-spacing: -4px;
            line-height: 1;
            transition: all 0.5s;
            text-shadow: 0 0 80px var(--accent-glow);
        }
        .hero-desc {
            font-size: 1.4rem;
            font-weight: 400;
            color: var(--text-secondary);
            text-transform: capitalize;
            letter-spacing: 1px;
        }
        .hero-location {
            font-size: 1.1rem;
            color: var(--text-tertiary);
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 4px;
        }
        .hero-feels {
            font-size: 1rem;
            color: var(--text-tertiary);
            margin-top: 2px;
        }
        .scroll-indicator {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            animation: bounceDown 2s infinite;
            opacity: 0.6;
            cursor: pointer;
        }
        @keyframes bounceDown {
            0%,
            100% {
                transform: translateX(-50%) translateY(0);
            }
            50% {
                transform: translateX(-50%) translateY(14px);
            }
        }
        .scroll-indicator svg {
            width: 32px;
            height: 32px;
            stroke: #fff;
            stroke-width: 2;
            fill: none;
        }

        /* ── Section Titles ─────────────────────── */
        .section-title {
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            text-align: center;
            color: var(--text-primary);
            position: relative;
        }
        .section-title::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 3px;
            border-radius: 10px;
            background: var(--accent-sunny);
            opacity: 0.7;
        }

        /* ── Glass Card ─────────────────────────── */
        .glass-card {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: var(--card-radius);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 24px 28px;
            transition: all 0.4s ease;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.2);
        }
        .glass-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 16px 50px rgba(0, 0, 0, 0.35);
            border-color: rgba(255, 255, 255, 0.25);
        }

        /* ── Hourly Scroll ──────────────────────── */
        .hourly-scroll {
            display: flex;
            gap: 14px;
            overflow-x: auto;
            padding: 10px 4px 16px;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            max-width: 95vw;
            scroll-behavior: smooth;
        }
        .hourly-scroll::-webkit-scrollbar {
            height: 4px;
        }
        .hourly-scroll::-webkit-scrollbar-track {
            background: transparent;
        }
        .hourly-scroll::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }
        .hourly-card {
            flex: 0 0 auto;
            width: 90px;
            text-align: center;
            scroll-snap-align: center;
            padding: 16px 10px;
            border-radius: 18px;
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            transition: all 0.35s ease;
            cursor: default;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .hourly-card:hover {
            transform: scale(1.07);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.3);
        }
        .hourly-card .time {
            font-size: 0.85rem;
            color: var(--text-tertiary);
            margin-bottom: 6px;
            font-weight: 500;
        }
        .hourly-card .icon-sm {
            width: 44px;
            height: 44px;
            margin: 0 auto 6px;
            filter: drop-shadow(0 0 10px var(--accent-glow));
        }
        .hourly-card .temp-sm {
            font-size: 1.2rem;
            font-weight: 600;
        }
        .hourly-card .precip {
            font-size: 0.7rem;
            color: #5b9bd5;
            margin-top: 2px;
        }

        /* ── Daily Forecast ─────────────────────── */
        .daily-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 600px;
            width: 100%;
        }
        .daily-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            border-radius: 16px;
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            transition: all 0.35s;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .daily-row:hover {
            transform: translateX(6px);
            border-color: rgba(255, 255, 255, 0.35);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
        }
        .daily-row .day-name {
            font-weight: 600;
            width: 50px;
            font-size: 0.95rem;
        }
        .daily-row .day-icon {
            width: 36px;
            height: 36px;
        }
        .daily-row .temp-range {
            display: flex;
            gap: 8px;
            font-size: 0.95rem;
        }
        .daily-row .temp-high {
            font-weight: 600;
        }
        .daily-row .temp-low {
            color: var(--text-tertiary);
        }
        .daily-row .temp-bar-wrap {
            flex: 1;
            margin: 0 16px;
            height: 5px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }
        .daily-row .temp-bar-fill {
            height: 100%;
            border-radius: 10px;
            background: linear-gradient(90deg, #5b9bd5, #ffb347, #ff6b6b);
            transition: width 0.6s ease;
        }

        /* ── Details Grid ───────────────────────── */
        .details-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            max-width: 750px;
            width: 100%;
        }
        .detail-card {
            text-align: center;
            padding: 20px 16px;
            border-radius: 18px;
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            transition: all 0.35s;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .detail-card:hover {
            transform: scale(1.04);
            border-color: rgba(255, 255, 255, 0.35);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        .detail-card .detail-icon {
            font-size: 2rem;
            margin-bottom: 8px;
        }
        .detail-card .detail-value {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -1px;
        }
        .detail-card .detail-label {
            font-size: 0.78rem;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }

        /* ── Sunrise/Sunset Arc ─────────────────── */
        .sun-arc-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 180px;
            margin: 0 auto;
        }
        .sun-arc-svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }
        .sun-arc-path {
            fill: none;
            stroke: rgba(255, 255, 255, 0.2);
            stroke-width: 2;
            stroke-dasharray: 6 6;
        }
        .sun-dot {
            filter: drop-shadow(0 0 18px #ffb347);
            transition: all 2s ease;
            animation: sunPulse 3s ease-in-out infinite;
        }
        @keyframes sunPulse {
            0%,
            100% {
                r: 10;
                fill: #ffb347;
            }
            50% {
                r: 14;
                fill: #ffcc00;
            }
        }
        .sun-time-label {
            font-size: 0.85rem;
            fill: var(--text-secondary);
            text-anchor: middle;
        }
        .sun-time-value {
            font-size: 1rem;
            font-weight: 600;
            fill: #fff;
            text-anchor: middle;
        }

        /* ── AQI ────────────────────────────────── */
        .aqi-display {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .aqi-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 2.5rem;
            letter-spacing: -1px;
            border: 4px solid;
            transition: all 0.5s;
            position: relative;
        }
        .aqi-circle.good {
            border-color: #4caf84;
            color: #4caf84;
            box-shadow: 0 0 40px rgba(76, 175, 132, 0.35);
        }
        .aqi-circle.moderate {
            border-color: #ffb347;
            color: #ffb347;
            box-shadow: 0 0 40px rgba(255, 179, 71, 0.35);
        }
        .aqi-circle.unhealthy {
            border-color: #ff6b6b;
            color: #ff6b6b;
            box-shadow: 0 0 40px rgba(255, 107, 107, 0.35);
        }
        .aqi-circle .aqi-label {
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .aqi-pollutants {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .aqi-pollutant {
            padding: 10px 16px;
            border-radius: 12px;
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            text-align: center;
            font-size: 0.9rem;
        }

        /* ── Reveal Animation ──────────────────── */
        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* ── Loading Spinner ───────────────────── */
        .loading-overlay {
            position: fixed;
            inset: 0;
            z-index: 999;
            background: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
            pointer-events: all;
        }
        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .loader-ring {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(255, 255, 255, 0.15);
            border-top-color: #ffb347;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── Responsive ────────────────────────── */
        @media (max-width: 768px) {
            .navbar {
                padding: 10px 14px;
            }
            .navbar .search-input {
                width: 140px;
                font-size: 0.85rem;
                padding: 8px 14px;
            }
            .navbar .search-input:focus {
                width: 180px;
            }
            .navbar .logo {
                font-size: 1.2rem;
            }
            .navbar .unit-toggle {
                padding: 6px 12px;
                font-size: 0.8rem;
            }
            .section {
                padding: 80px 14px 40px;
            }
            .hero-temp {
                font-size: 4rem;
                letter-spacing: -2px;
            }
            .hero-weather-icon {
                width: 100px;
                height: 100px;
            }
            .details-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
            .detail-card {
                padding: 14px 10px;
            }
            .detail-card .detail-value {
                font-size: 1.3rem;
            }
            .hourly-card {
                width: 70px;
                padding: 12px 6px;
            }
            .daily-row {
                padding: 10px 14px;
            }
            .daily-row .temp-bar-wrap {
                margin: 0 8px;
            }
        }

        @media (max-width: 400px) {
            .navbar .search-input {
                width: 100px;
            }
            .navbar .search-input:focus {
                width: 140px;
            }
            .details-grid {
                grid-template-columns: 1fr 1fr;
                gap: 8px;
            }
            .hourly-card {
                width: 60px;
            }
        }
    </style>
</head>
<body>
    <!-- Particle Canvas -->
    <canvas id="particleCanvas"></canvas>

    <!-- Loading -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loader-ring"></div>
    </div>

    <!-- Main Content -->
    <div class="main-wrapper">
        <!-- Navbar -->
        <nav class="navbar" id="navbar">
            <span class="logo">☁️ WeatherVue</span>
            <div class="search-container">
                <input type="text" class="search-input" id="searchInput" placeholder="Search city..." autocomplete="off">
                <button class="search-btn" id="searchBtn" aria-label="Search">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                </button>
                <button class="unit-toggle" id="unitToggle" title="Toggle temperature unit">°C / °F</button>
            </div>
        </nav>

        <!-- Hero Section -->
        <section class="section section-hero" id="heroSection">
            <div class="reveal" style="transition-delay: 0.1s;">
                <div class="hero-weather-icon" id="heroIcon">
                    <!-- SVG injected dynamically -->
                </div>
            </div>
            <div class="reveal" style="transition-delay: 0.2s;">
                <h1 class="hero-temp" id="heroTemp">--°</h1>
            </div>
            <div class="reveal" style="transition-delay: 0.3s;">
                <p class="hero-desc" id="heroDesc">Loading...</p>
            </div>
            <div class="reveal" style="transition-delay: 0.35s;">
                <p class="hero-location" id="heroLocation">📍 --</p>
            </div>
            <div class="reveal" style="transition-delay: 0.4s;">
                <p class="hero-feels" id="heroFeels">Feels like --</p>
            </div>
            <div class="scroll-indicator" onclick="document.getElementById('hourlySection').scrollIntoView({behavior:'smooth'})">
                <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
        </section>

        <!-- Hourly Forecast -->
        <section class="section section-hourly" id="hourlySection">
            <h2 class="section-title reveal">Hourly Forecast</h2>
            <div class="hourly-scroll reveal" id="hourlyScroll"></div>
        </section>

        <!-- Daily Forecast -->
        <section class="section section-daily" id="dailySection">
            <h2 class="section-title reveal">7-Day Forecast</h2>
            <div class="daily-list reveal" id="dailyList"></div>
        </section>

        <!-- Details Grid -->
        <section class="section section-details" id="detailsSection">
            <h2 class="section-title reveal">Weather Details</h2>
            <div class="details-grid reveal" id="detailsGrid"></div>
        </section>

        <!-- Sunrise & Sunset -->
        <section class="section section-sun" id="sunSection">
            <h2 class="section-title reveal">Sunrise & Sunset</h2>
            <div class="sun-arc-container reveal" id="sunArcContainer">
                <svg class="sun-arc-svg" viewBox="0 0 500 180" id="sunArcSvg">
                    <path class="sun-arc-path" id="sunArcPath" d="M 40 160 Q 250 -20 460 160"/>
                    <circle class="sun-dot" id="sunDot" cx="250" cy="70" r="10" fill="#ffb347"/>
                    <text class="sun-time-label" id="sunriseLabel" x="50" y="175">Sunrise</text>
                    <text class="sun-time-value" id="sunriseValue" x="50" y="155">--:--</text>
                    <text class="sun-time-label" id="sunsetLabel" x="450" y="175">Sunset</text>
                    <text class="sun-time-value" id="sunsetValue" x="450" y="155">--:--</text>
                </svg>
            </div>
        </section>

        <!-- Air Quality -->
        <section class="section section-air" id="airSection">
            <h2 class="section-title reveal">Air Quality</h2>
            <div class="aqi-display reveal" id="aqiDisplay">
                <div class="aqi-circle good" id="aqiCircle">
                    <span id="aqiValue">--</span>
                    <span class="aqi-label" id="aqiCategory">AQI</span>
                </div>
                <div class="aqi-pollutants" id="aqiPollutants"></div>
            </div>
        </section>
    </div>

    <script>
        (function() {
            // ──────────────────────────────────────
            // STATE
            // ──────────────────────────────────────
            const state = {
                lat: 40.7128,
                lon: -74.006,
                cityName: 'New York',
                country: 'US',
                timezone: 'America/New_York',
                unit: 'celsius', // 'celsius' | 'fahrenheit'
                weatherData: null,
                airQualityData: null,
                particles: [],

            // ──────────────────────────────────────
            // UTILITY FUNCTIONS
            // ──────────────────────────────────────
            function tempCtoF(c) { return Math.round(c * 9 / 5 + 32); }

            function formatTemp(c) {
                if (state.unit === 'fahrenheit') return tempCtoF(c) + '°F';
                return Math.round(c) + '°C';
            }

            function formatTempShort(c) {
                if (state.unit === 'fahrenheit') return tempCtoF(c) + '°';
                return Math.round(c) + '°';
            }

            function getWeatherDescription(code) {
                const map = {
                    0: 'Clear Sky',
                    1: 'Mostly Clear',
                    2: 'Partly Cloudy',
                    3: 'Overcast',
                    45: 'Fog',
                    48: 'Depositing Rime Fog',
                    51: 'Light Drizzle',
                    53: 'Moderate Drizzle',
                    55: 'Dense Drizzle',
                    61: 'Slight Rain',
                    63: 'Moderate Rain',
                    65: 'Heavy Rain',
                    71: 'Slight Snow',
                    73: 'Moderate Snow',
                    75: 'Heavy Snow',
                    77: 'Snow Grains',
                    80: 'Slight Rain Showers',
                    81: 'Moderate Rain Showers',
                    82: 'Violent Rain Showers',
                    85: 'Slight Snow Showers',
                    86: 'Heavy Snow Showers',
                    95: 'Thunderstorm',
                    96: 'Thunderstorm + Hail',
                    99: 'Severe Thunderstorm',
                };
                return map[code] || 'Unknown';
            }

            function getWeatherType(code) {
                if (code === 0) return 'clear';
                if (code >= 1 && code <= 2) return 'partly-cloudy';
                if (code === 3) return 'cloudy';
                if (code >= 45 && code <= 48) return 'fog';
                if (code >= 51 && code <= 55) return 'drizzle';
                if (code >= 61 && code <= 65) return 'rain';
                if (code >= 71 && code <= 77) return 'snow';
                if (code >= 80 && code <= 82) return 'rain';
                if (code >= 85 && code <= 86) return 'snow';
                if (code >= 95 && code <= 99) return 'thunderstorm';
                return 'cloudy';
            }

            function getParticleType(weatherType) {
                switch (weatherType) {
                    case 'rain':
                    case 'drizzle':
                    case 'thunderstorm':
                        return 'rain';
                    case 'snow':
                        return 'snow';
                    case 'fog':
                        return 'mist';
                    case 'clear':
                    case 'partly-cloudy':
                    default:
                        return 'sparkle';
                }
            }

            // ──────────────────────────────────────
            // PARTICLE SYSTEM
            // ──────────────────────────────────────
            function initParticleCanvas() {
                const canvas = particleCanvas;
                const ctx = canvas.getContext('2d');
                state.canvasCtx = ctx;

                function resize() {
                    state.canvasWidth = window.innerWidth;
                    state.canvasHeight = window.innerHeight;
                    canvas.width = state.canvasWidth;
                    canvas.height = state.canvasHeight;
                }
                resize();
                window.addEventListener('resize', resize);

                function createParticles() {
                    const count = state.particleType === 'rain' ? 120 :
                        state.particleType === 'snow' ? 80 :
                        state.particleType === 'mist' ? 50 : 60;
                    state.particles = [];
                    for (let i = 0; i < count; i++) {
                        state.particles.push({
                            x: Math.random() * state.canvasWidth,
                            y: Math.random() * state.canvasHeight,
                            size: state.particleType === 'rain' ? Math.random() * 2 + 1 :
                                state.particleType === 'snow' ? Math.random() * 5 + 2 :
                                state.particleType === 'mist' ? Math.random() * 40 + 20 :
                                Math.random() * 3 + 1,
                            speedY: state.particleType === 'rain' ? Math.random() * 6 + 8 :
                                state.particleType === 'snow' ? Math.random() * 1.5 + 0.5 :
                                state.particleType === 'mist' ? Math.random() * 0.3 + 0.1 :
                                Math.random() * 1.2 + 0.4,
                            speedX: state.particleType === 'rain' ? 0 :
                                state.particleType === 'snow' ? Math.random() * 0.8 - 0.4 :
                                state.particleType === 'mist' ? Math.random() * 0.4 - 0.2 :
                                Math.random() * 0.6 - 0.3,
                            opacity: Math.random() * 0.7 + 0.2,
                            wobble: Math.random() * Math.PI * 2,
                            wobbleSpeed: Math.random() * 0.03 + 0.01,
                        });
                    }
                }
                createParticles();

                function drawSparkle(p) {
                    const ctx = state.canvasCtx;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255,200,120,${p.opacity})`;
                    ctx.fill();
                    ctx.shadowColor = 'rgba(255,180,80,0.6)';
                    ctx.shadowBlur = p.size * 4;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }

                function drawRain(p) {
                    const ctx = state.canvasCtx;
                    ctx.beginPath();
                    ctx.moveTo(p.x, p.y);
                    ctx.lineTo(p.x - 0.5, p.y + p.size * 8);
                    ctx.strokeStyle = `rgba(150,200,240,${p.opacity})`;
                    ctx.lineWidth = p.size;
                    ctx.lineCap = 'round';
                    ctx.stroke();
                }

                function drawSnow(p) {
                    const ctx = state.canvasCtx;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255,255,255,${p.opacity})`;
                    ctx.fill();
                    ctx.shadowColor = 'rgba(255,255,255,0.5)';
                    ctx.shadowBlur = p.size * 3;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }

                function drawMist(p) {
                    const ctx = state.canvasCtx;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
                    grad.addColorStop(0, `rgba(200,210,220,${p.opacity * 0.4})`);
                    grad.addColorStop(1, 'rgba(200,210,220,0)');
                    ctx.fillStyle = grad;
                    ctx.fill();
                }

                function animate() {
                    const ctx = state.canvasCtx;
                    ctx.clearRect(0, 0, state.canvasWidth, state.canvasHeight);
                    const drawFn = state.particleType === 'rain' ? drawRain :
                        state.particleType === 'snow' ? drawSnow :
                        state.particleType === 'mist' ? drawMist : drawSparkle;

                    for (const p of state.particles) {
                        p.y += p.speedY;
                        p.x += p.speedX + Math.sin(p.wobble) * 0.4;
                        p.wobble += p.wobbleSpeed;
                        if (state.particleType === 'rain' && p.y > state.canvasHeight + 20) {
                            p.y = -20;
                            p.x = Math.random() * state.canvasWidth;
                        } else if (state.particleType === 'snow' && p.y > state.canvasHeight + 10) {
                            p.y = -15;
                            p.x = Math.random() * state.canvasWidth;
                        } else if (state.particleType === 'mist' && p.y > state.canvasHeight + 50) {
                            p.y = -60;
                            p.x = Math.random() * state.canvasWidth;
                        } else if (state.particleType === 'sparkle') {
                            if (p.y > state.canvasHeight + 10) { p.y = -10;
                                p.x = Math.random() * state.canvasWidth; }
                            if (p.x > state.canvasWidth + 10) p.x = -10;
                            if (p.x < -10) p.x = state.canvasWidth + 10;
                        }
                        drawFn(p);
                    }
                    state.animationId = requestAnimationFrame(animate);
                }
                animate();

                // Update particles when type changes
                window.updateParticleType = function(newType) {
                    if (state.particleType !== newType) {
                        state.particleType = newType;
                        createParticles();
                    }
                };
            }

            // ──────────────────────────────────────
            // API CALLS
            // ──────────────────────────────────────
            async function fetchWeather(lat, lon) {
                const url =
                    `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m,pressure_msl,uv_index,visibility&hourly=temperature_2m,weather_code,precipitation_probability&daily=temperature_2m_max,temperature_2m_min,weather_code,sunrise,sunset,precipitation_probability_max,uv_index_max&timezone=auto&forecast_days=7`;
                const res = await fetch(url);
                if (!res.ok) throw new Error('Weather fetch failed');
                return await res.json();
            }

            async function fetchAirQuality(lat, lon) {
                const url =
                    `https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}&current=european_aqi,pm2_5,pm10,nitrogen_dioxide,ozone&timezone=auto`;
                const res = await fetch(url);
                if (!res.ok) return null;
                return await res.json();
            }

            async function geocodeCity(cityName) {
                const url =
                    `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(cityName)}&count=5&language=en&format=json`;
                const res = await fetch(url);
                if (!res.ok) throw new Error('Geocoding failed');
                const data = await res.json();
                if (!data.results || data.results.length === 0) throw new Error('City not found');
                return data.results[0];
            }

            async function reverseGeocode(lat, lon) {
                try {
                    const url =
                        `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=10&accept-language=en`;
                    const res = await fetch(url, {
                        headers: { 'User-Agent': 'WeatherVueApp/1.0' }
                    });
                    if (!res.ok) throw new Error('Reverse geocode failed');
                    const data = await res.json();
                    const addr = data.address || {};
                    return addr.city || addr.town || addr.village || addr.county || addr.state || 'Unknown Location';
                } catch (e) {
                    return `${lat.toFixed(2)}°, ${lon.toFixed(2)}°`;
                }
            }

            // ──────────────────────────────────────
            // RENDER FUNCTIONS
            // ──────────────────────────────────────
            function renderHero(data) {
                const current = data.current;
                const code = current.weather_code;
                const weatherType = getWeatherType(code);
                const desc = getWeatherDescription(code);
                const tempC = current.temperature_2m;
                const feelsC = current.apparent_temperature;

                heroIcon.innerHTML = getWeatherIconSVG(weatherType, 140);
                heroTemp.textContent = formatTemp(tempC);
                heroDesc.textContent = desc;
                heroLocation.innerHTML = `📍 ${state.cityName}${state.country ? ', ' + state.country : ''}`;
                heroFeels.textContent = `Feels like ${formatTemp(feelsC)}`;

                // Update particle type
                const pt = getParticleType(weatherType);
                if (typeof updateParticleType === 'function') updateParticleType(pt);

                // Dynamic accent color
                const accentMap = {
                    'clear': '#ffb347',
                    'partly-cloudy': '#e8b860',
                    'cloudy': '#b0bec5',
                    'rain': '#5b9bd5',
                    'drizzle': '#6ba3d8',
                    'thunderstorm': '#7c5cbf',
                    'snow': '#d0dce8',
                    'fog': '#a0aab4'
                };
                const accent = accentMap[weatherType] || '#b0bec5';
                document.documentElement.style.setProperty('--accent-glow', accent.replace(')', ',0.45)').replace(
                    'rgb',
                    'rgba').replace('#', 'rgba(');
                if (accent.startsWith('#')) {
                    const r = parseInt(accent.slice(1, 3), 16);
                    const g = parseInt(accent.slice(3, 5), 16);
                    const b = parseInt(accent.slice(5, 7), 16);
                    document.documentElement.style.setProperty('--accent-glow', `rgba(${r},${g},${b},0.45)`);
                }
                document.documentElement.style.setProperty('--accent-sunny', accent);
            }

            function renderHourly(data) {
                const hourly = data.hourly;
                const now = new Date();
                const currentHour = now.getHours();
                const times = hourly.time;
                const temps = hourly.temperature_2m;
                const codes = hourly.weather_code;
                const precip = hourly.precipitation_probability || [];

                let html = '';
                const startIdx = times.findIndex(t => new Date(t).getHours() >= currentHour);
                const displayCount = 24;
                const begin = Math.max(0, startIdx >= 0 ? startIdx : 0);

                for (let i = begin; i < Math.min(begin + displayCount, times.length); i++) {
                    const d = new Date(times[i]);
                    const hour = d.getHours();
                    const timeLabel = hour === 0 ? '12 AM' : hour < 12 ? hour + ' AM' : hour === 12 ? '12 PM' : (hour -
                        12) + ' PM';
                    const wt = getWeatherType(codes[i]);
                    const tp = temps[i];
                    const pp = precip[i] || 0;
                    html += `
                <div class="hourly-card">
                  <div class="time">${timeLabel}</div>
                  <div class="icon-sm">${getSmallIconSVG(wt, 44)}</div>
                  <div class="temp-sm">${formatTempShort(tp)}</div>
                  ${pp > 0 ? `<div class="precip">💧${pp}%</div>` : ''}
                </div>`;
                }
                hourlyScroll.innerHTML = html;
            }

            function renderDaily(data) {
                const daily = data.daily;
                const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
                let html = '';
                const allHighs = daily.temperature_2m_max;
                const allLows = daily.temperature_2m_min;
                const globalMin = Math.min(...allLows);
                const globalMax = Math.max(...allHighs);
                const range = globalMax - globalMin || 1;

                for (let i = 0; i < Math.min(7, daily.time.length); i++) {
                    const d = new Date(daily.time[i]);
                    const dayName = i === 0 ? 'Today' : days[d.getDay()];
                    const wt = getWeatherType(daily.weather_code[i]);
                    const high = allHighs[i];
                    const low = allLows[i];
                    const leftPercent = ((low - globalMin) / range) * 100;
                    const widthPercent = ((high - low) / range) * 100;
                    html += `
                <div class="daily-row">
                  <span class="day-name">${dayName}</span>
                  <span class="day-icon">${getSmallIconSVG(wt, 36)}</span>
                  <span class="temp-range"><span class="temp-low">${formatTempShort(low)}</span></span>
                  <span class="temp-bar-wrap"><span class="temp-bar-fill" style="margin-left:${leftPercent}%;width:${Math.max(widthPercent,4)}%"></span></span>
                  <span class="temp-range"><span class="temp-high">${formatTempShort(high)}</span></span>
                </div>`;
                }
                dailyList.innerHTML = html;
            }

            function renderDetails(data) {
                const current = data.current;
                const details = [
                    { icon: '💧', value: current.relative_humidity_2m + '%', label: 'Humidity' },
                    { icon: '💨', value: Math.round(current.wind_speed_10m) + ' km/h', label: 'Wind Speed' },
                    { icon: '🧭', value: current.wind_direction_10m + '°', label: 'Wind Direction' },
                    { icon: '🔽', value: Math.round(current.pressure_msl) + ' hPa', label: 'Pressure' },
                    { icon: '☀️', value: Math.round(current.uv_index || 0), label: 'UV Index' },
                    { icon: '👁️', value: (current.visibility / 1000).toFixed(1) + ' km', label: 'Visibility' },
                ];
                detailsGrid.innerHTML = details.map(d => `
              <div class="detail-card">
                <div class="detail-icon">${d.icon}</div>
                <div class="detail-value">${d.value}</div>
                <div class="detail-label">${d.label}</div>
              </div>`).join('');
            }

            function renderSunriseSunset(data) {
                const daily = data.daily;
                const sunrise = daily.sunrise[0];
                const sunset = daily.sunset[0];
                const srDate = new Date(sunrise);
                const ssDate = new Date(sunset);
                const now = new Date();

                const srMin = srDate.getHours() * 60 + srDate.getMinutes();
                const ssMin = ssDate.getHours() * 60 + ssDate.getMinutes();
                const nowMin = now.getHours() * 60 + now.getMinutes();
                const totalDayMin = ssMin - srMin;

                sunriseValue.textContent = srDate.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                sunsetValue.textContent = ssDate.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                // Position sun dot on arc
                let sunX = 250;
                let sunY = 70;
                if (nowMin <= srMin) {
                    sunX = 40;
                    sunY = 158;
                } else if (nowMin >= ssMin) {
                    sunX = 460;
                    sunY = 158;
                } else {
                    const progress = (nowMin - srMin) / totalDayMin;
                    sunX = 40 + progress * 420;
                    // Parabolic arc: y = a*(x-h)^2 + k, vertex at (250, 40), endpoints at (40,158) and (460,158)
                    const t = progress; // 0 to 1
                    sunY = 158 - Math.sin(t * Math.PI) * 118;
                }
                sunDot.setAttribute('cx', sunX);
                sunDot.setAttribute('cy', sunY);
            }

            function renderAirQuality(aqData) {
                if (!aqData || !aqData.current) {
                    aqiCircle.className = 'aqi-circle moderate';
                    aqiValue.textContent = '--';
                    aqiCategory.textContent = 'No Data';
                    aqiPollutants.innerHTML = '';
                    return;
                }
                const aqi = aqData.current.european_aqi || 0;
                const pm25 = aqData.current.pm2_5 || 0;
                const pm10 = aqData.current.pm10 || 0;
                const no2 = aqData.current.nitrogen_dioxide || 0;
                const o3 = aqData.current.ozone || 0;

                let aqiClass = 'good';
                let category = 'Good';
                if (aqi > 60) { aqiClass = 'unhealthy';
                    category = 'Unhealthy'; } else if (aqi > 30) { aqiClass = 'moderate';
                    category = 'Moderate'; }

                aqiCircle.className = 'aqi-circle ' + aqiClass;
                aqiValue.textContent = aqi;
                aqiCategory.textContent = category;
                aqiPollutants.innerHTML = `
              <div class="aqi-pollutant">PM2.5<br><strong>${pm25.toFixed(1)}</strong> µg/m³</div>
              <div class="aqi-pollutant">PM10<br><strong>${pm10.toFixed(1)}</strong> µg/m³</div>
              <div class="aqi-pollutant">NO₂<br><strong>${no2.toFixed(1)}</strong> µg/m³</div>
              <div class="aqi-pollutant">O₃<br><strong>${o3.toFixed(1)}</strong> µg/m³</div>`;
            }

            // ──────────────────────────────────────
            // MAIN LOAD
            // ──────────────────────────────────────
            async function loadAllData(lat, lon, cityNameOverride) {
                loadingOverlay.classList.remove('hidden');
                try {
                    const [weatherData, airQualityData] = await Promise.all([
                        fetchWeather(lat, lon),
                        fetchAirQuality(lat, lon),
                    ]);
                    state.weatherData = weatherData;
                    state.airQualityData = airQualityData;
                    state.lat = lat;
                    state.lon = lon;
                    state.timezone = weatherData.timezone || 'UTC';

                    if (cityNameOverride) {
                        state.cityName = cityNameOverride;
                        state.country = '';
                    } else {
                        const city = await reverseGeocode(lat, lon);
                        state.cityName = city;
                    }

                    renderHero(weatherData);
                    renderHourly(weatherData);
                    renderDaily(weatherData);
                    renderDetails(weatherData);
                    renderSunriseSunset(weatherData);
                    renderAirQuality(airQualityData);

                    // Reveal animations
                    setTimeout(() => {
                        document.querySelectorAll('.reveal').forEach(el => el.classList.add('visible'));
                    }, 200);

                } catch (err) {
                    console.error('Failed to load weather data:', err);
                    heroTemp.textContent = '--°';
                    heroDesc.textContent = 'Unable to load weather';
                    heroLocation.innerHTML = '📍 --';
                }
                loadingOverlay.classList.add('hidden');
            }

            // ──────────────────────────────────────
            // INITIAL LOCATION
            // ──────────────────────────────────────
            async function getInitialLocation() {
                // Try browser geolocation
                if ('geolocation' in navigator) {
                    try {
                        const pos = await new Promise((resolve, reject) => {
                            navigator.geolocation.getCurrentPosition(resolve, reject, {
                                timeout: 8000,
                                enableHighAccuracy: false
                            });
                        });
                        return {
                            lat: pos.coords.latitude,
                            lon: pos.coords.longitude,
                            city: null
                        };
                    } catch (e) {
                        console.log('Geolocation denied or failed, trying IP fallback...');
                    }
                }
                // IP fallback
                try {
                    const res = await fetch('https://ipapi.co/json/');
                    const data = await res.json();
                    return {
                        lat: data.latitude || 40.7128,
                        lon: data.longitude || -74.006,
                        city: data.city || null
                    };
                } catch (e) {
                    return { lat: 40.7128, lon: -74.006, city: 'New York' };
                }
            }

            // ──────────────────────────────────────
            // SEARCH
            // ──────────────────────────────────────
            async function handleSearch() {
                const query = searchInput.value.trim();
                if (!query) return;
                try {
                    loadingOverlay.classList.remove('hidden');
                    const result = await geocodeCity(query);
                    const lat = result.latitude;
                    const lon = result.longitude;
                    const name = result.name || query;
                    const country = result.country_code ? result.country_code.toUpperCase() : '';
                    state.country = country;
                    await loadAllData(lat, lon, name);
                    searchInput.value = '';
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } catch (err) {
                    alert('City not found. Please try another search.');
                    console.error(err);
                }
                loadingOverlay.classList.add('hidden');
            }

            searchBtn.addEventListener('click', handleSearch);
            searchInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') handleSearch();
            });

            // ──────────────────────────────────────
            // UNIT TOGGLE
            // ──────────────────────────────────────
            unitToggle.addEventListener('click', () => {
                state.unit = state.unit === 'celsius' ? 'fahrenheit' : 'celsius';
                unitToggle.textContent = state.unit === 'celsius' ? '°C / °F' : '°F / °C';
                if (state.weatherData) {
                    renderHero(state.weatherData);
                    renderHourly(state.weatherData);
                    renderDaily(state.weatherData);
                    renderDetails(state.weatherData);
                }
            });

            // ──────────────────────────────────────
            // SCROLL EFFECTS
            // ──────────────────────────────────────
            function handleScroll() {
                const scrollY = window.scrollY;
                if (scrollY > 60) {
                    navbar.classList.add('scrolled');
                } else {
                    navbar.classList.remove('scrolled');
                }

                // Reveal on scroll
                document.querySelectorAll('.reveal:not(.visible)').forEach(el => {
                    const rect = el.getBoundingClientRect();
                    if (rect.top < window.innerHeight * 0.85) {
                        el.classList.add('visible');
                    }
                });
            }
            window.addEventListener('scroll', handleScroll, { passive: true });

            // ──────────────────────────────────────
            // REFRESH DATA PERIODICALLY
            // ──────────────────────────────────────
            function startAutoRefresh() {
                setInterval(async () => {
                    if (state.lat && state.lon) {
                        try {
                            const [weatherData, airQualityData] = await Promise.all([
                                fetchWeather(state.lat, state.lon),
                                fetchAirQuality(state.lat, state.lon),
                            ]);
                            state.weatherData = weatherData;
                            state.airQualityData = airQualityData;
                            renderHero(weatherData);
                            renderHourly(weatherData);
                            renderDaily(weatherData);
                            renderDetails(weatherData);
                            renderSunriseSunset(weatherData);
                            renderAirQuality(airQualityData);
                            document.querySelectorAll('.reveal').forEach(el => el.classList.add('visible'));
                        } catch (e) {
                            console.log('Auto-refresh failed, will retry.');
                        }
                    }
                }, 15 * 60 * 1000); // Every 15 minutes
            }

            // ──────────────────────────────────────
            // BOOT
            // ──────────────────────────────────────
            async function boot() {
                initParticleCanvas();
                const loc = await getInitialLocation();
                if (loc.city) {
                    state.cityName = loc.city;
                }
                await loadAllData(loc.lat, loc.lon, loc.city);
                startAutoRefresh();
                // Initial scroll check
                handleScroll();
            }

            boot();

            console.log('%c🌤️ WeatherVue %cReady %c— Beautiful weather at your fingertips',
                'font-size:1.4em;font-weight:bold;',
                'font-size:1em;color:#4caf84;',
                'color:#aaa;');
            console.log('%cFeatures: %cAnimated particles • Glassmorphism • Real-time data • Scroll-snap • AQI • Sunrise arc',
                'font-weight:bold;', 'font-weight:normal;color:#ffb347;');
        })();
    </script>
</body>
</html>
